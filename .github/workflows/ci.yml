name: CI

# Runs the three-layer green gate's CI layer per
# docs/_meta/throughline/AUTO_CONTINUE_WORKFLOW.md: typecheck, test suite,
# lint, and build all passing. Pre-existed only as policy until the
# 2026-05-28 cohort-level heavy hardener pass over Phases 19–22 added this
# workflow.
#
# Enforcement note: this workflow runs on every push and pull_request, but
# it gates merges only if the spec author sets it as a required status
# check in branch protection (Settings → Branches). Until that repo-admin
# action lands the workflow is advisory; the chain runner's local pre-PR
# pass remains the load-bearing check.

on:
  pull_request:
  push:
    branches:
      - main
      - 'claude/**'

# I8: cancel superseded in-flight runs for the same ref so a rapid push series
# doesn't queue redundant gate runs (the latest commit is the one that matters).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # `main` is exempt — every merged commit gets a full, uncancelled verification.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  gate:
    runs-on: ubuntu-latest
    # I8: a hung step (e.g. a watcher/test deadlock) fails fast instead of burning
    # the 6h default runner budget.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Lint
        run: pnpm -r lint

      - name: Build
        run: pnpm -r build
